<body>

<h1>Simulador de logística</h1>

<p>
Este simulador calcula un recorrido básico de entregas según el vehículo,
la cantidad de pedidos y la distancia estimada de cada uno.
</p>

<p>
El sistema solicita datos mediante cuadros de diálogo de JavaScript
y muestra los resultados en alertas y en la consola del navegador.
</p>

<script src="./js/main.js"></script>

</body>
