<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto Final - Simulador de Entregas</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<main>
    <h1>Simulador de Logística</h1>
    <p>
        Calculá recorridos, consumo de combustible, costo total
        y guardá el historial de simulaciones.
    </p>

    <section>
        <h2>Datos del recorrido</h2>

        <label for="vehiculo">Vehículo</label>
        <select id="vehiculo">
            <option value="">Cargando vehículos...</option>
        </select>

        <label for="cantidadPedidos">Cantidad de pedidos</label>
        <input type="number" id="cantidadPedidos" min="1" value="3">

        <label for="precioCombustible">Precio del combustible</label>
        <input type="number" id="precioCombustible" min="1" value="1200">

        <button id="generarPedidos">Generar pedidos</button>
    </section>

    <section>
        <h2>Kilómetros por pedido</h2>
        <div id="contenedorPedidos"></div>
    </section>

    <section>
        <button id="calcularRecorrido">Calcular recorrido</button>
        <button id="borrarHistorial">Borrar historial</button>
    </section>

    <section>
        <h2>Resultado</h2>
        <div id="resultado">
            <p>Completá los datos para ver el resultado.</p>
        </div>
    </section>

    <section>
        <h2>Historial</h2>
        <div id="historial">
            <p>No hay simulaciones todavía.</p>
        </div>
    </section>
</main>

<!-- Librería -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Tu JS -->
<script src="./js/main.js"></script>

</body>
</html>
    <script src="./js/main.js"></script>
</body>
</html>
