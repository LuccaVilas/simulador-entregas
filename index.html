<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Logística</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <main>
        <h1>Simulador de Logística</h1>
        <p>Calculá recorridos básicos de entregas según el vehículo, la cantidad de pedidos y los kilómetros de cada uno.</p>

        <section>
            <h2>Datos de entrega</h2>

            <label for="vehiculo">Elegí el vehículo:</label>
            <select id="vehiculo">
                <option value="">Cargando vehículos...</option>
            </select>

            <label for="cantidadPedidos">Cantidad de pedidos:</label>
            <input type="number" id="cantidadPedidos" min="1" placeholder="Ej: 3">

            <button id="generarPedidos">Generar pedidos</button>
        </section>

        <section>
            <h2>Kilómetros por pedido</h2>
            <div id="contenedorPedidos"></div>
        </section>

        <section>
            <button id="calcularRecorrido">Calcular recorrido</button>
        </section>

        <section>
            <h2>Resultado</h2>
            <div id="resultado">
                <p>Completá los datos para ver el resultado.</p>
            </div>
        </section>
    </main>

    <script src="./js/main.js"></script>
</body>
</html>
